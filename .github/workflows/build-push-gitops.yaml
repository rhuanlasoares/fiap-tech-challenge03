name: Reusable — Build and Push Image

on:
  workflow_call:
    inputs:
      imageName:
        required: true
        type: string
      imageTag:
        required: true
        type: string
      nameService:
        required: true
        type: string
      region:
        required: true
        type: string 
      service_path:
        required: true
        type: string
    secrets:
      PROJECT_ID:
        required: true
      WORKLOAD_IDENTITY_PROVIDER:
        required: true
      SERVICE_ACCOUNT:
        required: true

jobs:
  build-and-push-image:
    name: Build and Push Image
    runs-on: ubuntu-latest

    steps:
      # Clona o código-fonte do repositório para a máquina virtual (runner)
      - name: Checkout repository
        uses: actions/checkout@v6

      # Autentica no Google Cloud de forma segura usando Workload Identity Federation
      - name: GCP Autentication
        id: auth
        uses: 'google-github-actions/auth@v3'
        with:
          project_id: ${{ secrets.PROJECT_ID }}
          token_format: "access_token"
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT}}

      # Faz o login no Google Artifact Registry usando o token gerado no step anterior
      - name: Login to Artifact Registry
        uses: docker/login-action@v1
        with:
          registry: ${{ inputs.region }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # Configura o Docker Buildx para habilitar recursos avançados, como cache de build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Constrói a imagem Docker a partir do diretório do serviço e a envia (push) para o registro
      - name: Build & push image to GCR
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ inputs.service_path }}
          push: true
          tags: | 
            ${{ inputs.imageName }}:${{ inputs.imageTag }}
            ${{ inputs.imageName }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_COMMIT=${{ inputs.imageTag }}
            GIT_BRANCH=${{ github.ref_name }}

      # Imprime um pequeno painel visual de resumo na interface de execução do GitHub Actions
      - name: 📊 Build Summary
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ inputs.imageName }}:${{ inputs.imageTag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Built and Pushed to GAR" >> $GITHUB_STEP_SUMMARY

  update-gitops:
    name: 📝 Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: build-and-push-image
    
    steps:
      # Clona o repositório novamente para que possamos modificar os arquivos Kubernetes
      - name: 📥 Checkout código
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      # Baixa o binário oficial do Kustomize e o instala no runner
      - name: 🔧 Setup Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize version
      
      # Entra na pasta do serviço e substitui a imagem antiga pela nova tag gerada no build
      - name: 📝 Update image tag in kustomization
        run: |
          cd k8s/${{ inputs.nameService }}

          echo "🔄 Updating image tag to: ${{ inputs.imageTag }}"
          kustomize edit set image \
            ${{ inputs.nameService }}=${{ inputs.imageName }}:${{ inputs.imageTag }}
          
          echo "✅ Kustomization updated"
          cat kustomization.yaml
      
      # Configura o Git temporário para commitar a mudança no kustomization.yaml e fazer push
      - name: 💾 Commit and push changes
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git pull
          git add k8s/${{ inputs.nameService }}/kustomization.yaml
          
          if git diff --staged --quiet; then
            echo "⚠️ No changes to commit"
          else
            git commit -m "🚀 Update production image to ${{ inputs.imageTag }}"
            git push origin main
            echo "✅ Changes pushed to repository"
          fi

      # Testa a compilação do Kustomize localmente para garantir que não introduzimos erros de sintaxe
      - name: ✅ Validate Kubernetes manifests
        run: |
          echo "🔍 Validating manifests..."
          cd k8s/${{ inputs.nameService }}
          
          kustomize build . > /tmp/manifests.yaml
          
          echo "✅ Manifests are valid"