    if: inputs.language == 'python'
    name: SCA Python (${{ inputs.service_path }})
    runs-on: ubuntu-latest
    steps:
      # Clona o repositório para o runner, garantindo acesso aos arquivos Python e listas de dependências
      - uses: actions/checkout@v4

      # Prepara o ambiente instalando a versão correta do Python conforme os parâmetros do workflow
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      # Atualiza o pip e instala as dependências listadas no requirements.txt, preparando o terreno para a varredura
      - name: Install Dependencies
        working-directory: ${{ inputs.service_path }}
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Roda o Trivy no diretório do projeto para encontrar pacotes Python vulneráveis, aplicando a regra de bloqueio se configurado
