apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: analytics-service-hc-policy
  namespace: analytics-ns
spec:
  default:
    checkIntervalSec: 5
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    config:
      type: HTTP
      httpHealthCheck:
        port: 8005
        requestPath: /health
  targetRef:
    group: ""
    kind: Service
    name: analytics-service
