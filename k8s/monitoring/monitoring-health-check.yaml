apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: monitoring-service-hc-policy
  namespace: monitoring-ns
spec:
  default:
    checkIntervalSec: 5
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    config:
      type: HTTP
      httpHealthCheck:
        port: 3000
        requestPath: /api/health
  targetRef:
    group: ""
    kind: Service
    name: monitoring-grafana
