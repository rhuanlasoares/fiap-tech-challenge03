---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: targeting-service
  namespace: targeting-ns
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "25%"
      maxUnavailable: "25%"
  selector:
    matchLabels:
      app: targeting-service
  template:
    metadata:
      labels:
        app: targeting-service
    spec:
      serviceAccountName: sa-gke
      initContainers:
        - name: cloud-sql-proxy
          restartPolicy: Always
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          args:
            - "--private-ip"
            - "--port=$(DB_PORT)"
            - "$(CLOUDSQL_CONNECTION_NAME)"
          env:
            - name: CLOUDSQL_CONNECTION_NAME
              valueFrom:
                secretKeyRef:
                  name: targeting-secrets
                  key: CLOUDSQL_CONNECTION_NAME
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: targeting-secrets
                  key: DB_PORT
          securityContext:
            runAsNonRoot: true
      containers:
        - name: targeting-service
          image: targeting-service
          imagePullPolicy: Always
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            periodSeconds: 15
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            periodSeconds: 15
            initialDelaySeconds: 30
          ports:
            - containerPort: 8003
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: targeting-database-secrets
                  key: DATABASE_URL
            - name: AUTH_SERVICE_URL
              valueFrom:
                secretKeyRef:
                  name: targeting-secrets
                  key: AUTH_SERVICE_URL
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: targeting-secrets
                  key: PORT
          resources:
            requests:
              cpu: 16m
              memory: 128Mi
            limits:
              cpu: 128m
              memory: 512Mi
