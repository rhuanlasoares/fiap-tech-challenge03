apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: targeting-ns

# 1. Correção do Ciclo: Liste os arquivos explicitamente
resources:
- targeting-db-migration-job.yaml
- targeting-health-check.yaml
- targeting-netpol.yaml
- targeting-service-configmap.yaml
- targeting-service-deployment.yaml
- targeting-service-pdb.yaml
