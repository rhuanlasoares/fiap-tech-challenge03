---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: auth-ns
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "25%"
      maxUnavailable: "25%"
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: sa-gke
      initContainers:
        - name: cloud-sql-proxy
          restartPolicy: Always
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          args:
            - "--private-ip"
            - "--port=$(DB_PORT)"
            - "$(CLOUDSQL_CONNECTION_NAME)"
          env:
            - name: CLOUDSQL_CONNECTION_NAME
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: CLOUDSQL_CONNECTION_NAME
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: DB_PORT
          securityContext:
            runAsNonRoot: true
      containers:
        - name: auth-service
          image: auth-service
          # image: southamerica-east1-docker.pkg.dev/ces-igniteprogram/artreg-auth/auth-service:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            periodSeconds: 10
            initialDelaySeconds: 15
          ports:
            - containerPort: 8001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-database-secrets
                  key: DATABASE_URL
            - name: MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: MASTER_KEY
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: auth-secrets
                  key: PORT
          resources:
            requests:
              cpu: 20m
              memory: 50Mi
            limits:
              cpu: 70m
              memory: 250Mi
