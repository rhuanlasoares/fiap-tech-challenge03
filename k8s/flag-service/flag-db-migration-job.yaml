---
apiVersion: batch/v1
kind: Job
metadata:
  name: flag-db-migration
  namespace: flag-ns
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: sa-gke
      initContainers:
        - name: cloud-sql-proxy
          restartPolicy: Always
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.1
          args:
            - "--private-ip"
            - "--port=$(DB_PORT)"
            - "$(CLOUDSQL_CONNECTION_NAME)"
          env:
            - name: CLOUDSQL_CONNECTION_NAME
              valueFrom:
                secretKeyRef:
                  name: flag-secrets
                  key: CLOUDSQL_CONNECTION_NAME
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: flag-secrets
                  key: DB_PORT
      containers:
        - name: migrate
          image: postgres:15
          command:
            - sh
            - -c
            - |
              echo "⏳ Aguardando banco ficar disponível..."
              until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER"; do
                sleep 3
              done

              echo "🚀 Executando migration..."
              PGPASSWORD="$DB_PASSWORD" psql \
                -h "$DB_HOST" \
                -p "$DB_PORT" \
                -U "$DB_USER" \
                -d "$DB_NAME" \
                -f /migrations/init.sql

              echo "✅ Migration concluída com sucesso"
          env:
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: flag-secrets
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                secretKeyRef:
                  name: flag-secrets
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: flag-secrets
                  key: POSTGRES_USER
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: flag-secrets
                  key: POSTGRES_DB
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flag-database-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: migration-sql
              mountPath: /migrations
              readOnly: true

      volumes:
        - name: migration-sql
          configMap:
            name: flag-db-init
