---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: analytics-ns
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "25%"
      maxUnavailable: "25%"
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      serviceAccountName: sa-gke
      containers:
        - name: analytics-service
          image: analytics-service:latest
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            periodSeconds: 15
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8005
            periodSeconds: 15
            initialDelaySeconds: 30
          ports:
            - containerPort: 8005
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: AWS_SESSION_TOKEN
            - name: PORT
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: PORT
            - name: AWS_SQS_URL
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: AWS_SQS_URL
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: AWS_REGION
            - name: AWS_DYNAMODB_TABLE
              valueFrom:
                secretKeyRef:
                  name: analytics-secrets
                  key: AWS_DYNAMODB_TABLE
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 512Mi
